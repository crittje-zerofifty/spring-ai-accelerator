name: spring-ai-accelerator-history
version: '3.8'
services:
  postgres:
    image: postgres:latest
    container_name: spring-ai-accelerator
    environment:
      POSTGRES_DB: accelerator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_accelerator_data:/var/lib/postgresql/data

volumes:
  postgres_accelerator_data:
