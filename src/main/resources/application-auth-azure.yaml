spring:
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            scope: openid, profile, email
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/8e9f8275-ea51-40d3-9b0c-45b2a9c90f53/v2.0
